assessment: 'The question asks for cumulative Switch 2 Japan sales through May 24,
  starting from a known base of 5,367,660 as of May 10. The key driver is a 20% price
  hike effective May 25, creating intense pre-hike rush buying.


  Evidence strongly supports elevated sales well above normal rates (~50k/week). The
  Golden Week period already showed 107k/week with only partial price-hike effect.
  Multiple credible reports describe "launch-like" conditions, retailer purchase restrictions,
  and sellouts.


  The main uncertainty is the magnitude of the surge vs. supply constraints. My scenario
  mixture weights: 15% conservative (~200k 2-week), 45% base case (~305k), 30% high
  (~415k), 10% extreme (~500k). The median 2-week estimate is ~325k, bringing cumulative
  to ~5.69M.


  Key tension: Demand clearly exceeds supply (reports of sellouts), but we''re forecasting
  actual units sold (supply-limited), not demand. Nintendo likely redirected some
  inventory to Japan ahead of the hike but can''t fully meet surge demand.'
calibration_notes: My P10 (5,577k) implies 2-week sales of ~210k, roughly equal to
  the Golden Week 2-week total. Given strong evidence of even more intense demand,
  this seems like a reasonable lower bound - it would require the surge to be no stronger
  than Golden Week despite much more urgency. My P90 (5,835k) implies ~467k for 2
  weeks, about 2.2x Golden Week or 1.13x holiday-season rate per week. This seems
  achievable if supply is adequate.
key_uncertainties: The biggest uncertainty is the supply constraint. If Nintendo aggressively
  restocked Japan ahead of the hike, sales could reach 400-500k for the 2 weeks. If
  retailers genuinely ran out mid-period, sales could be capped at 200-250k despite
  massive demand. The reports of sellouts suggest the latter is a real possibility.
