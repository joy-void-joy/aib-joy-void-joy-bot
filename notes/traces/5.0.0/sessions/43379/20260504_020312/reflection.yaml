assessment: 'The key dynamic is a two-phase event cycle: (1) late April news coverage
  spike about upcoming BCBS settlement payments peaking around May 2, followed by
  (2) actual payment distribution starting on/around May 11. May 4 sits on the declining
  side of the news spike, while May 12 is the day after payment distribution begins.
  Monte Carlo simulations with weighted scenarios for payment spike magnitude (0.3x
  to 1.3x the news peak) yield ~55-65% probability of Increases, ~25-30% Decreases,
  ~8-10% Doesn''t change. The result is highly sensitive to the payment spike assumption.
  The threshold for Doesn''t Change (within 3 points on 0-100 scale) is very narrow,
  making it inherently unlikely unless May 4 and May 12 coincidentally land at similar
  levels. The dominant uncertainty is whether 6 million claimants checking their payment
  status will drive comparable search volume to the broader news coverage audience.'
calibration_notes: My estimate of 58% Increases diverges from the naive base rate
  that would favor Decreases (since we're starting near a peak). However, the specific
  catalyst (payment distribution on May 11) is a strong differentiator from the typical
  post-peak decay scenario. The payment event creates a plausible second spike that
  counteracts the default decay. If I'm wrong about the payment spike magnitude, this
  could easily flip to Decreases.
key_uncertainties: 'The primary uncertainty is the magnitude of the payment distribution
