assessment: The core tension is between strong historical precedent (near-annual SRAG
  emergency decrees) and a genuine structural change (the Leito Garantido program
  enacted in March 2026). The conditions in June 2026 (93% ICU occupancy, rising SRAG
  cases, low vaccination) are similar to those that triggered the June 2025 decree.
  However, the critical difference is that the state now has a permanent mechanism
  (Leito Garantido) to contract private ICU beds when occupancy hits 97%, which was
  the primary function emergency decrees served. The fact that the government has
  NOT issued a decree despite identical conditions is the strongest evidence that
  they're relying on this new tool. The remaining 13-day window creates genuine uncertainty
  - conditions could rapidly deteriorate, especially as winter begins June 21 - but
  the government would likely first activate Leito Garantido before escalating to
  an emergency decree. A decree becomes plausible mainly in a scenario where ICU occupancy
  spikes above 97% AND Leito Garantido proves insufficient, or where political pressure
  forces action.
calibration_notes: The anchor of 75% annual probability is high, but this is a 15-day
  window with a structural policy change. The factor sum implies roughly 23-25%, which
  feels right. I'm not hedging toward 50% - the evidence clearly favors NO given the
  Leito Garantido factor and absence of a decree so far.
