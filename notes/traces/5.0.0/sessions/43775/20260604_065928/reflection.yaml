  2026 data produces a median of 3, with P10=1 and P90=7. The negative binomial model
  gives similar results. The high overdispersion in weekly data (0 to 5 refineries
  per week in May) means there''s genuine tail risk in both directions.


  The distribution is right-skewed: the floor is 1 (already confirmed), but intense
  strike weeks could push to 7+ distinct refineries. The question specifically excludes
  terminals, depots, and pumping stations, which reduces the count relative to total
  oil infrastructure strikes.'
