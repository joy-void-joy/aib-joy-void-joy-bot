  2. As of June 3, 1 refinery (Ilsky) is confirmed struck in the June 1-13 window

  3. Several non-refinery targets were also hit (St. Petersburg oil terminal, Zenzevatka
  pumping station, Armavir oil depot) - these don''t count

  4. The campaign tempo has been accelerating in 2026, with the "logistics lockdown"
  announcement

  5. No ceasefire is in effect


