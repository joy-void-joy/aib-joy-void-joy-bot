  State Duma election list, approved at the June 28, 2026 congress.


  **Evidence for 5 (50% probability):**

  - January 2026 reporting unanimously pointed to 5 (RBC, NEST, IES, UNN/ISW)

  - Vedomosti (June 11) still reports 5, albeit with different names

  - 2021 precedent was 5

  - Wartime context creates pressure to include SVO-related figures


  **Evidence for 3 (33% probability):**

  - Kommersant reports sociological research and focus groups showing voters prefer
  a compact 3-person format

  - Historical familiarity (troika is a traditional Russian concept)

  - The "troika" option emerged as a later alternative, possibly reflecting evolving
  Kremlin thinking

  - The Kommersant title "Избиратель любит троицу" (The voter loves a trinity) signals
  data-driven reasoning


  **Evidence for other values (17% combined):**

  - 4: Possible if troika + woman for gender balance (7%)

  - 1: Putin alone as emergency (2%)

  - 6-10: Larger than typical, no source mentions this (7%)

  - 2: Not mentioned by any source (1%)


  The distribution is strongly bimodal with 83% of probability mass at 3 or 5. The
  median is 5 and the mean is 4.3.'
