assessment: 'This is a discrete counting question with a known floor of 16. The key
  question is how many additional complete off-site power losses will occur and be
  reported by June 14, 2026.


  Monte Carlo simulation with rate uncertainty (Gamma posterior on Poisson rate, incorporating
  4 censored days since last event) yields:

  - P(16) ≈ 57-59% (no additional events)

  - P(17) ≈ 28-29% (one additional event)

  - P(18) ≈ 9-10% (two additional events)

  - P(19) ≈ 3% (three additional events)

  - P(20+) ≈ 1%


  The distribution is heavily right-skewed with the mode at 16 but meaningful probability
  mass at 17-18. The main tension is between:

  - The high fragility of the single backup line and elevated military activity (pushing
  toward more events)

  - The recent 32-day gap suggesting some stabilization, and the short remaining time
  window (pushing toward fewer events)


  The probability of at least one additional event is ~41%, meaning the count will
  more likely than not remain at 16, but 17 is a strong secondary outcome.'
calibration_notes: Model uses Bayesian rate uncertainty (Gamma posterior) which naturally
  widens the distribution. The 99th percentile at 20 seems reasonable - would require
  ~4 events in 11 days, which happened in April (3 events in 12 days). The low tail
  is hard-bounded at 16 (known count). The simulation accounts for the 4 days of censored
  observation since the last event.
key_uncertainties: '1. Whether military activity near ZNPP intensifies or moderates
