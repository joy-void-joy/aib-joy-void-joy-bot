assessment: 'The question asks whether any single nationwide Spanish poll with fieldwork
  ending June 13-27 will show a PP-PSOE gap of 9.0+ points. The maximum observed in
  the current cycle is SocioMetrica''s 8.0 (May 2026), meaning the threshold has never
  been crossed.


  The primary path to YES is through SocioMetrica (El Español), which has the strongest
  pro-PP house effect (~+1.5pp above average). If they publish a qualifying poll with
  expected lead ~7.0-7.5, the probability of a single poll crossing 9.0 is about 21-30%
  (given SE ~1.87pp). With ~75% chance they have a qualifying poll, SocioMetrica alone
  contributes ~15-22% to the YES probability.


  Other pollsters (GAD3, Sigma Dos, Invymark, 40dB, etc.) have expected leads of 4.7-6.5,
  making it much harder for them to cross 9.0, though with SE ~1.9pp, tail events
  are possible. Collectively they add ~5-8% to the probability.


  The Caso Koldo verdict could widen the gap, but the scandal has been in the news
  for over a year, so incremental effect is modest (~0.5pp if verdict comes during
  the window).


  Monte Carlo simulations across various parameterizations give 23-33% for this scenario,
  with the range driven by assumptions about SocioMetrica''s true expected lead and
  the verdict effect. I estimate ~18% after discounting for the fact that the 9.0
  threshold is unprecedented and SocioMetrica''s 8.0 was likely noise-elevated.'
calibration_notes: 'The 9.0 threshold has never been reached in any poll in this legislature.
  This is strong evidence but not dispositive since the gap has been widening. My
  estimate of 18% sits below the simulation median (~27%) because I apply a discount
  for model risk and unprecedented threshold. The hedging check: I''m not at 50%,
  and my evidence clearly supports below-average probability. Status quo (no poll
  reaching 9+) resolves NO.'
