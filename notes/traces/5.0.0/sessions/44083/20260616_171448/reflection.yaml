  substantial - May had only 0.85/day while April had 1.77/day.

  3. **Recent trend**: After the vote-a-rama burst (36 votes in ~7 days), pace has
  dropped sharply to ~0.5 votes/day over June 12-15. This is normal post-burst cooldown.

  4. **Upcoming business**: Senate is currently processing judicial nominations. A
  CRA vote (S.J. Res. 190) is in progress today. Pre-recess weeks often see batches
  of nomination votes.

  5. **Monte Carlo**: Two independent simulations converge on median ~184, P10 ~178,
  P90 ~193.


