assessment: 'The question asks whether the UNSC will adopt a resolution related to
  US-Iran ceasefire/peace between June 13-28, 2026. The key challenge is that this
  requires a chain of contingencies:


  1. The deal must actually be signed (scheduled June 19, ~72% probability)

  2. A UNSC resolution text must be drafted from scratch (no text exists as of June
  16)

  3. All P5 must agree or at least not veto (adversarial dynamics: US vs Russia/China)

  4. A vote must be scheduled and held within 9 days of signing


  The JCPOA precedent (Resolution 2231, adopted 6 days after deal) is frequently cited
  but misleading: all P5 were parties to the JCPOA, and the resolution text was pre-negotiated
  in parallel with the deal itself. Here, the deal is bilateral (US-Iran), Russia
  and China are adversarial, and no resolution text is being negotiated.


  The Security Council Report''s June 2026 monthly forecast shows only routine Iran
  items planned (1737 Sanctions Committee briefing, Resolution 2231 implementation
  report) - no peace deal endorsement or ceasefire vote.


  The most likely scenario: if the deal is signed June 19, UNSC endorsement would
  come later (likely after the 60-day comprehensive negotiation period), not within
  9 days. The initial MOU is a framework, not the comprehensive deal that would merit
  UNSC endorsement.


  Alternative path: The Russia/China/Pakistan ceasefire draft would almost certainly
  be vetoed by the US. The question requires actual adoption, not just a vote.


  My decomposition gives P(YES) ≈ 8.7%, which I round to ~9%. Sensitivity analysis
  shows the range is 4-17.5% depending on assumptions about UNSC action conditional
  on deal signing.'
