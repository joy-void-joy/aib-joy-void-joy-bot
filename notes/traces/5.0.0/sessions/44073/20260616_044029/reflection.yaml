  toward higher rates, as evidenced by 3 reds in the opener. However, the post-opener
  matches appear calmer, suggesting the opening match was an outlier rather than the
  new normal. The historical average group stage rate is ~0.185/match, which for 72
  matches gives ~13.3. Recent tournaments (2018, 2022) were dramatically lower at
  ~0.06/match (giving ~4.3 for 72). My model uses a 3-scenario mixture with Bayesian
  updating from the observed early data. The Monte Carlo simulation gives a median
  of 13, mean of 14.1, with P10=7 and P90=22. This feels right - centered near the
  historical average but with meaningful right-skew from the possibility that new
  rules truly shift the regime.
