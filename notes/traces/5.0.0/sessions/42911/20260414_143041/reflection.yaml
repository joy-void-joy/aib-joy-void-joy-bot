assessment: 'The question asks whether ANY AdaptyvBio protein-binder competition before
  2030 will have >75% of ALL tested designs classified as binders. This is a high
  bar because it requires the OVERALL competition average (not just the best performer)
  to exceed 75%.


  **Current state**: Competition-wide rates range from 2.5% to 14%. Individual top
  performers already achieve 80-90%. The gap between best and average is enormous
  (~76 percentage points in Nipah).


  **Path to YES requires one of**:

  1. Tool commoditization where average users achieve 75%+ (currently average tools
  get 5-15%)

  2. Expert-only competition format (RBX-1 is a precedent, but even expert teams average
  well below 75% today)

  3. Very easy target + good tools + skilled participants

  4. Improved in-silico screening that pre-filters to only highly likely binders


  **Key tension**: The gap between published tool performance (BindCraft avg 46%)
  and competition performance (BindCraft 5.7% on Nipah) suggests that target difficulty
  and user expertise are major factors beyond raw tool capability. Even if tools improve
  further, competition settings may not reach published benchmarks.


  **Monte Carlo analysis**: My simulation across scenarios gives a weighted cumulative
  probability of ~31%, with strong dependence on scenario weights. Conservative scenarios
  (slow improvement) give ~0-5%, while optimistic scenarios (fast tool improvement
  + expert format) give 70-95%.


  **Counterargument**: A smart disagreer would note that the improvement trajectory
  is genuinely exponential, that individual performers ALREADY exceed the threshold,
  and that 3.5 years in this field is an eternity. They''d point to BindCraft going
  from concept to widely-used open-source tool in <2 years, and argue that by 2028-2029,
  the default tools will be dramatically better. They''d also note that in-silico
  filtering will improve alongside design tools, making it easier to select likely
  binders before testing.


  **My response**: While individual tool improvement is remarkable, the question asks
  about competition-wide rates. The diversity of participants and target difficulty
  create structural barriers. Even if the best tools achieve 95%+ by 2029, the variance
  in participant quality and target selection makes 75% overall unlikely in any single
  competition. But with 6-10+ tries, it''s not negligible.


  I settle on 25%, slightly below my model''s 31%, because I think my model''s improvement
  rate assumptions in the optimistic scenarios are somewhat too aggressive given the
  BindCraft competition performance gap.'
