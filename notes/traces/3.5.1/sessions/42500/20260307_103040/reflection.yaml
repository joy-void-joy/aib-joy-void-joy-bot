assessment: 'VIX at 29.49 during an active US/Israel-Iran war (Day 7). The Strait
  of Hormuz is closed, disrupting 20% of global oil supply. Both sides reject negotiations.


  The core tension is between VIX''s powerful mean-reversion (both major analogues
  - Russia-Ukraine and tariff shock - show VIX reverting from 37-52 peaks to ~21-22
  within 40 trading days) and the ongoing/unprecedented nature of the Hormuz closure
  (no prior VIX analogue involves complete closure of a critical oil chokepoint).


  The 20-25 range is the most likely single outcome because: (1) historical mean-reversion
  from current ~29.5 naturally targets this range, (2) markets adapt to geopolitical
  shocks even when the underlying conflict persists, (3) 40 trading days provides
  substantial mean-reversion time. But the 25+ range remains the second most likely
  because: (1) Hormuz closure is unprecedented, (2) war shows no signs of ending,
  (3) oil at $92+ creates sustained inflation/growth fears.


  The simulation yields: <15=1.8%, 15-20=25.2%, 20-25=34.2%, 25+=38.7%. I adjust slightly
  from the raw simulation: reduce below-15 to 3% (rounding), keep 15-20 at 22% (slightly
  lower than MC since de-escalation requires concrete progress), increase 20-25 to
  38% (center of gravity given mean-reversion evidence), and set 25+ at 37% (slightly
  below MC to account for historical mean-reversion being somewhat understated in
  my OU model).'
calibration_notes: 'Base rate: VIX long-term average ~19-20. Over past 14 months,
  VIX was in 15-20 range ~51% of the time, 20-25 ~29%, 25+ ~18%, below 15 ~2%. But
  current active-war conditions are far from average.


  Key mean-reversion check: Both major analogues (Russia-Ukraine 2022, tariff shock
  2025) show VIX reverting from much higher peaks (37, 52) to ~21-22 within 40 trading
  days. Current VIX (29.49) is lower than both peaks, so the expected reversion target
  should be similar or lower.


  Hedging check: I''m giving 37% to 25+ and 38% to 20-25, which is a genuine directional
  call toward the two middle-high buckets rather than a lazy split. The uncertainty
  is real - the Hormuz closure is unprecedented and could keep VIX elevated longer
  than historical analogues suggest.'
key_uncertainties: '1. Hormuz reopening timeline - if it reopens before April 30,
  VIX drops rapidly toward 18-20. If it stays closed, VIX likely remains 25+.

  2. War duration - Trump''s 4-5 week estimate vs Iran''s rejection of terms. Back-channel
