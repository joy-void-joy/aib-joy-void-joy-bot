assessment: 'The question asks whether ANY party will win 133+ seats. Two scenarios:


  1. Fidesz supermajority: Requires independent polls to be catastrophically wrong
  (10+ point swing). Fidesz-friendly polls show them ahead but even the most favorable
  (Magyar Társadalomkutató 51%) would be borderline for supermajority given the need
  for ~45-50% vote share. This scenario requires Tisza support to collapse.


  2. Tisza supermajority: Even more unlikely. Tisza would need to win ~90+ of 106
  districts AND dominate the list vote. Current projections max at ~132 seats in the
  most optimistic scenarios. The electoral system''s structural advantages (gerrymandering,
  out-of-country votes) work against them. Experts say Tisza needs a 6-8 point lead
  just for a simple majority.


  3. Neither: Most likely. A competitive two-party race with Mi Hazánk taking 5-7%
  makes supermajority extremely difficult for either side. All expert analyses converge
  on this being the least likely outcome.


  The only realistic supermajority path is a Fidesz one, given the electoral system
  was designed to benefit the incumbent. But this would require independent polls
  to be massively wrong and Tisza to underperform by 15+ points vs independent polls.
  While Fidesz has outperformed polls before (2022), the magnitude required here is
  unprecedented.


  I estimate ~8% probability, reflecting that while the electoral system makes supermajorities
  possible, the current competitive landscape makes them very unlikely.'
calibration_notes: 'Base rate: 4/4 elections under current system (2014-2022) produced
  supermajorities, but this is misleading - all were with fragmented/weak opposition.
  The 2026 election features a genuinely competitive opposition for the first time
  under the new system. The status quo (Fidesz supermajority) is the starting point,
  but the polling shift is dramatic and sustained. I''m adjusting significantly downward
  from the historical base rate.'
key_uncertainties: 1. How accurate are independent vs Fidesz-friendly polls? If Fidesz-friendly
