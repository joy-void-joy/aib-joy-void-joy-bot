  will reach 850,000 before April 5, 2026. As of Week 6 (Feb 14), the CDC reports
  "at least 310,000" hospitalizations. Using the 2024-25 season''s upper/lower ratio
  of ~2.0x, the current upper bound is approximately 620,000 - well below the 850,000
  threshold.


  For the upper bound to reach 850,000, we would need either: (1) substantial growth
  in cumulative hospitalizations (40%+ more), or (2) a higher-than-expected upper/lower
  ratio combined with significant growth. The weekly hospitalization rate has declined
  from a peak of 12.8 per 100k to 2.0 per 100k, and would need to average ~4 per 100k
  for the remaining 7 weeks - which would require the rate to INCREASE from current
  levels.


  The main upside risk is influenza B, which is rising from 38% toward potentially
  surpassing influenza A. However, B-type waves are historically smaller than H3N2
  waves, and even if B causes a modest second peak, it''s unlikely to generate the
  sustained high rates needed.


  Monte Carlo simulation with reasonable parameter distributions yields approximately
  5% probability. The main pathways to YES require an unlikely combination of a significant
  B-type second wave AND the upper end of the uncertainty ratio.'
