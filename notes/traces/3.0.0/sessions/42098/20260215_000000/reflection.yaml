  a specific week (Feb 9-15, 2026). The period has essentially already occurred (today
  is Feb 15), but the actual data isn''t publicly available yet.


  My baseline is the 2025 equivalent week (Mon-Sun before Presidents'' Day): 15,813,431
  passengers. The calendar alignment between 2025 and 2026 is nearly perfect for this
  week.


  Key tension: BTS data shows Oct 2025 was still +1.7% YoY, but the US Travel Association
  dashboard shows Nov 2025 domestic air trips were -0.7% YoY. This suggests the growth
  trend decelerated significantly and may have turned slightly negative by early 2026.


  My scenario-weighted model produces a median of ~15.86M, with the distribution reflecting
  uncertainty about the growth rate (0.5% central with scenarios for demand weakness
  and strength).


  The 80% confidence interval (P10-P90) spans roughly 15.54M to 16.17M.'
calibration_notes: 'Base rate: TSA weekly volumes in February have been in the 14-16M
  range in recent years. The question range of 12-17M is reasonable. My distribution
  is centered near 15.85M with relatively tight uncertainty since the week has essentially
  occurred and there''s no evidence of major disruption. The main uncertainty is the
  YoY growth rate for Feb 2026 vs Feb 2025.'
key_uncertainties: '1. Actual YoY growth rate for Feb 2026 (could be -2% to +3%)

  2. Whether demand weakness accelerated in Q1 2026

  3. Whether late January storm deferred or suppressed travel in this period

