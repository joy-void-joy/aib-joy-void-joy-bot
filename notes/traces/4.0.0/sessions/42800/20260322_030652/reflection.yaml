assessment: 'This question hinges on whether March 2026 revenue exceeds January''s
  NT$401,255M. February at NT$317,657M is effectively eliminated.


  The Q1 guidance range of $34.6-35.8B implies March revenue of NT$374-412B depending
  on where Q1 lands. At guidance midpoint with the guided exchange rate (31.6), March
  is ~NT$393B - below January. However, two factors push March higher:


  1. TSMC typically beats guidance modestly, so actual Q1 may be $35.3-35.5B

  2. The TWD has weakened to ~32.0 vs the 31.6 guidance assumption, boosting TWD-denominated
  revenue


  The sensitivity analysis shows this is genuinely close to a coin flip. At $35.3B
  Q1 and 31.7 FX, it''s roughly 54% Jan / 46% Mar. At $35.4B and 31.8 FX, it flips
  to 34% Jan / 66% Mar.


  Historically, January has been the highest Q1 month for TSMC in recent years, which
  provides a mild prior favoring January. The key counterargument is the exchange
  rate: if March TWD is indeed around 32.0, even a modest Q1 beat could push March
  above January.


  I''m assigning roughly equal probability with a very slight edge to March, given
  the exchange rate tailwind and beat tendency, balanced against the historical January-heavy
  pattern. This is genuinely uncertain.'
