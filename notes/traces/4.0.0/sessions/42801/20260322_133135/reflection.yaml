assessment: 'This is a threshold question: will Yes vote share exceed 60%? I modeled
  the underlying Yes vote share as a Beta distribution centered around 65% with ~8%
  standard deviation, reflecting strong government support but significant uncertainty
  due to absence of independent polling.


  PRO (Yes > 60%): The ruling PNC has overwhelming institutional power - 75/93 parliamentary
  seats, control of state media, and the proposal was passed 72-73 in parliament.
  The proposal itself (combining elections for cost savings) is inherently popular.
  The referendum is combined with local elections where PNC will mobilize voters.
  Government survey claims 90% support (inflated but directionally positive). Multiple
  parties (MDA, JDP) support Yes alongside PNC.


  CON (Yes ≤ 60%): Opposition MDP is actively campaigning No with ''constitutional
  coup'' framing. Former presidents Nasheed and Solih have significant personal followings.
  Referendum dynamics differ from parliamentary elections - voters may use referendums
  as protest votes. Economic stress (fuel crisis, IMF warnings) could dampen government
  credibility. Elections Commission admitted it hasn''t been able to create adequate
  public awareness. No independent polls exist.


  Key tension: PNC''s electoral dominance suggests high Yes vote, but seat share overstates
  vote share in FPTP systems. PNC won 66/93 seats (71%) but likely received ~50-55%
  of votes. The 60% threshold is meaningful - it''s higher than a simple majority
  pass. However, the coalition of parties supporting Yes (PNC + MDA + JDP) collectively
  represents well over 60% of parliamentary seats.


  Monte Carlo simulation results: P(Yes > 60%) ranges from ~50% (conservative center
  at 60%) to ~92% (optimistic center at 70%). Base case (65% center, 8% std) gives
  P ≈ 70%. Accounting for ~2% cancellation risk, overall P ≈ 67%.'
calibration_notes: 'Base rate: Government-backed referendums in countries with supermajorities
  generally pass, but the margin varies. The 2007 Maldives referendum gave >60% for
  the government-backed option. However, counter-examples exist (Italian constitutional
  referendums rejected despite government support). The 60% threshold is not trivial
  - it requires substantial margin beyond simple majority. Status quo if nothing changes:
  the referendum happens April 4 and voters decide. Given PNC''s dominance, Yes passing
  seems likely, but clearing 60% is the specific question.'
key_uncertainties: '1. True public sentiment is unknown - no independent polls exist.
  Government''s 90% claim is unreliable. 2. Referendum vs election dynamics: voters
  behave differently in referendums. 3. Turnout effects: combined with local elections
  could boost or confuse. 4. Whether opposition framing of ''power grab'' resonates
  with swing voters. 5. Impact of economic stress on government credibility.'
tool_audit: 'Useful: Wikipedia (referendum details, context), Exa search (found crucial
  articles from Maldives Independent, MMTV, Standard Maldives with detailed political
  analysis), web_search (2024 election data). Partially useful: AskNews search_news
