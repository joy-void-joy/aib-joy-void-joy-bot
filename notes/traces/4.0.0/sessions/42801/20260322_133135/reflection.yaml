  (403 error - model restriction). Missing: No independent polling data exists for
  this referendum.'
update_triggers: 1. Independent polling showing Yes below 55% (would move to ~40%).
  2. Court ruling blocking the referendum (resolves No). 3. Major opposition defection
  or boycott (could push Yes higher if opposition stays home). 4. Significant political
  crisis or government scandal before April 4.
process_reflection: 'The scaffolding worked reasonably well for this question type.
  The main challenge was the absence of independent polling data for a small-country
  referendum, which makes the distribution center highly uncertain. The Exa search
  tool was particularly valuable in finding Maldivian English-language news sources.
  The Monte Carlo simulation framework worked well for a threshold question. One gap:
  there''s no good way to get vote share data from historical elections (PNC''s actual
  vote % vs seat %) without more granular election data tools. The AskNews news research
  tool being restricted to ''deepseek-basic'' was an annoying limitation. I would
  have benefited from a tool that could pull structured election result data from
  IFES or similar databases.'
