assessment: 'The Michigan synagogue attack occurred on March 12, 2026, causing a massive
  spike in search interest (peaking at 100 on March 13). By March 17, interest has
  decayed to 1 - essentially at the floor/baseline level.


  The key structural fact: at a start value of 1, "Decreases" is virtually impossible
  since Google Trends can''t go below 0, and a change of -1 is well within the ±3
  threshold. This eliminates one option almost entirely.


  The contest is between "Doesn''t change" and "Increases." For Increases, the Mar
  25 value would need to exceed 4. This would require some new development to push
  renewed search interest. Potential catalysts include:

  - FBI investigation findings or terror classification

  - Legislative hearings on SB 502 (anti-terrorism bill)

  - Memorial events

  - Related events (more synagogue attacks in broader context)

  - Broader Israel-Iran conflict developments referencing this event


  However, follow-up stories about investigations, legislation, and policy responses
  rarely generate the same search volume as the original breaking news event. The
  search term is very specific and people primarily search for it during breaking
  news, not during follow-up coverage.


  The empirical base rates (81.8% no change) strongly favor "Doesn''t change." The
  stable tail of 2 days at the floor also supports this. The only meaningful risk
  is a significant new development - hence ~15% for Increases.


  Counterargument to my estimate: The story is still very active in the news (AG press
