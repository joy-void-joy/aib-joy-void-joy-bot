  2. **Level anchoring**: Under the enforcement regime (Feb 2025+), total SW encounters
  have ranged 7,822-12,450. Current levels at 9,726 are in the lower-middle of this
  range.


  3. **February signal**: White House claimed February 2026 was "lowest in history"
  for encounters. If true for SW border specifically, February was likely ~8,000-9,500.
  March would be somewhat higher due to 3 extra days.


  4. **Seasonal pattern**: FY2025 showed Mar slightly below Feb (-6%), but Apr-May
  rebounded (+9%, +4%). A modest spring uptick is plausible but the enforcement regime
