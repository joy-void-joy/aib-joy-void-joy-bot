  5. **Day count**: March (31 days) has 11% more days than February (28 days), partially
  offsetting any declining daily rate.


  Central estimate ~9,100 reflects the ongoing decline modestly offset by more days
  in March. The distribution is right-skewed to account for the possibility of seasonal
  uptick or policy disruption.'
