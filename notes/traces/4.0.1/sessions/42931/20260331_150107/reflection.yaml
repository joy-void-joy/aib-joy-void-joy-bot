assessment: 'The March 2026 advance goods trade balance sits at the intersection of
  several forces. The post-tariff-shock regime (May 2025-Jan 2026) has been volatile
  with mean ~-85.7B, but the February 20 IEEPA ruling and replacement with lower Section
  122 tariffs (ETR drop from 10.3% to 7.7%) should boost imports and widen the deficit.
  KPMG analysis explicitly predicts more imports in Feb/March. AI capital goods imports
  remain structurally strong. However, overall container volumes are declining YoY,
  providing partial offset.


  My Monte Carlo uses a 3-scenario mixture: (1) 50% weight on tariff-boost scenario
  (center -94B), (2) 35% on status-quo continuation (center -87B), (3) 15% on large
  import surge (center -108B). The median of -92.1B is robust across sensitivity variants
  (range -91.9 to -92.9). The 80% CI of [-108.7, -77.6] reflects the high volatility
  observed in recent months.


  Key counterarguments: The tariff reduction might not materially boost March imports
  because (a) the Section 122 tariff took effect nearly immediately, limiting the
  window of tariff-free imports, and (b) importers may need more lead time to adjust
  supply chains. This would push the number closer to -85 to -88B. Conversely, front-loading
  ahead of potential new tariffs could push it wider than -100B. The simulation captures
  both tails appropriately.


  The Census-BOP basis adjustment (roughly +0.5 to +1.2B) is applied since the question
  resolves to Census basis.'
calibration_notes: 'Base rate: The post-tariff regime average is -85.7B. In the broader
