assessment: 'The Danish political landscape after the March 24, 2026 election is highly
  fragmented. Neither traditional bloc has a majority, making the Moderates (14 seats)
  the kingmaker.


  **Red Bloc path (most likely):** Frederiksen is actively exploring S+SF+R+Moderates.
  This is the primary track - blue parties have already been excluded from talks.
  The main obstacles are the wealth tax (Moderates say "100% dead") and Moderates''
  refusal to depend on Enhedslisten. If Frederiksen drops the wealth tax and finds
  a way to minimize Enhedslisten''s role, this could work. Alternatively, a weaker
  S+SF+R minority government (68 seats) could survive under negative parliamentarism
  if Moderates abstain.


  **Cross Bloc path:** Løkke keeps pushing S+V+K+M publicly (April 2 Facebook appeal).
  Berlingske on April 2 discusses what V and K would need from Frederiksen. This is
  the natural fallback if red bloc talks fail. But V and K have publicly ruled out
  governing with S/Frederiksen, making a quick pivot difficult.


  **Blue Bloc path:** Nearly impossible. Blue bloc (77) + Moderates (14) = 91 on paper,
  but DF and DD refuse to work with Løkke. Internal blue divisions make this a non-starter.


  **No Formation before May:** The 2022 record was 42 days, which from March 24 would
  be May 5 - past the deadline. This parliament is more fragmented. Easter break (April
  3-6) delays progress. Frederiksen has warned of "long and difficult" talks. If red
  bloc talks fail and they need to pivot to cross-bloc, the remaining time (~3.5 weeks
  after Easter) may not be enough.


  The main tension is between Red Bloc and No Formation - the question is whether
  Frederiksen can overcome the Moderates'' objections within ~4 weeks. Cross Bloc
  is a real fallback but adds time pressure.'
calibration_notes: 'Base rate: Danish governments typically form in 2-4 weeks, but
  the 2022 record was 42 days. This parliament is the most fragmented in modern history,
  suggesting longer than average. The deadline effectively gives 37 days from election
  - slightly less than the 2022 record. Historical precedent from 1979-2022 shows
  all governments were single-bloc, except the 2022 cross-bloc exception. Red bloc
  governments are historically the norm when S leads.'
key_uncertainties: '1. Whether Moderates will accept joining S+SF+R or at least abstaining
  on a confidence vote

  2. Whether Frederiksen drops the wealth tax to accommodate Moderates

  3. Whether Venstre''s "no" to governing with S is truly final or a negotiating position

  4. How quickly talks resume and progress after Easter

  5. Whether any new external events accelerate formation (Greenland crisis escalation)'
