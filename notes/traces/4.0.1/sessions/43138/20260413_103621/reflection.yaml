  **Forecast evidence**: Both NWS (7-day) and AccuWeather (10-day through Apr 22)
  show 0% precipitation for all forecast days. The extended forecast effectively covers
  through Apr 22, leaving only ~8 days (Apr 23-30) with purely climatological uncertainty.
  No historical year in my sample had post-day-22 rain conditional on a dry first
  12 days.


