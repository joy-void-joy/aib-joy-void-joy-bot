assessment: 'The SPR was at 415.064M barrels as of week ending March 27, with barely
  any drawdown despite the March 11 announcement. The first tranche of 45.2M barrels
  was contracted on March 20 with delivery scheduled April 1-May 31.


  The key question is how fast barrels actually leave the SPR during April. The exchange
  mechanism is more complex than direct sales, the award criteria prioritized premium
  over speed, and only 45.2M of 86M offered was subscribed.


  The 2022 precedent shows ~23M barrels drawn in April 2022 via direct sales. Exchange
  contracts should be slower. My base case estimate of ~15-17M barrel drawdown over
  the measurement period (through week ending April 24) produces an SPR level around
  398-400M.


  Arguments for lower (faster drawdown): Political pressure, crisis severity, ''record
  speed'' claims, possible second solicitation, potential switch to direct sales.


  Arguments for higher (slower drawdown): Exchange complexity, limited subscription
  (only 52% of offered volume), ramp-up period needed, deliveries officially scheduled
  ''April-May'' with possibility but not guarantee of early delivery.


  The distribution is mildly left-skewed (downside tail from accelerated drawdown
  scenarios is wider than upside from delays).'
